<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정보공유 실시간 채팅</title>
<style>
  :root {
    --bg: #0f1420;
    --panel: #171e2e;
    --panel-2: #1e2740;
    --line: #2a3654;
    --text: #e8edf7;
    --muted: #8b97b3;
    --me: #3d6cf0;
    --me-deep: #2f56c4;
    --other: #232e4a;
    --accent: #64d8c6;
    --warn: #f0b23d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
  }
  .app {
    width: 100%;
    max-width: 560px;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--panel);
  }

  header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--muted);
  }
  .dot.on {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: .35; } }
  @media (prefers-reduced-motion: reduce) { .dot.on { animation: none; } }
  header h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  header .sub { font-size: 12px; color: var(--muted); margin-left: auto; }
  .name-chip {
    font-size: 12px; color: var(--accent);
    border: 1px solid var(--line);
    padding: 3px 10px; border-radius: 999px;
    cursor: pointer; background: none;
    font-family: inherit;
  }
  .name-chip:hover { border-color: var(--accent); }
  .name-chip:focus-visible, button:focus-visible, input:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }

  .banner {
    display: none;
    background: rgba(240, 178, 61, .12);
    border-bottom: 1px solid rgba(240, 178, 61, .4);
    color: var(--warn);
    font-size: 12.5px;
    line-height: 1.6;
    padding: 10px 16px;
  }
  .banner.show { display: block; }
  .banner code { font-family: ui-monospace, monospace; font-size: 11.5px; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .empty {
    margin: auto;
    text-align: center;
    color: var(--muted);
    font-size: 13.5px;
    line-height: 1.7;
  }
  .msg { display: flex; flex-direction: column; max-width: 78%; }
  .msg.me { align-self: flex-end; align-items: flex-end; }
  .msg.other { align-self: flex-start; align-items: flex-start; }
  .meta { font-size: 11px; color: var(--muted); margin: 0 4px 3px; }
  .bubble {
    padding: 9px 13px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.55;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .me .bubble {
    background: linear-gradient(160deg, var(--me), var(--me-deep));
    border-bottom-right-radius: 5px;
  }
  .other .bubble {
    background: var(--other);
    border-bottom-left-radius: 5px;
  }
  .time { font-size: 10.5px; color: var(--muted); margin: 3px 4px 0; }

  .composer {
    display: flex;
    gap: 8px;
    padding: 12px 14px;
    border-top: 1px solid var(--line);
    flex-shrink: 0;
    background: var(--panel);
  }
  .composer input {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 12px;
    padding: 11px 14px;
    font-size: 14px;
    font-family: inherit;
  }
  .composer input::placeholder { color: var(--muted); }
  .composer button {
    background: var(--me);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 0 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .composer button:disabled { opacity: .45; cursor: default; }

  .overlay {
    position: fixed; inset: 0;
    background: rgba(8, 12, 22, .75);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .overlay.hidden { display: none; }
  .modal {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 26px 24px;
    width: 100%; max-width: 320px;
  }
  .modal h2 { font-size: 16px; margin-bottom: 6px; }
  .modal p { font-size: 12.5px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
  .modal input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    margin-bottom: 12px;
    font-family: inherit;
  }
  .modal button {
    width: 100%;
    background: var(--me);
    color: #fff; border: none;
    border-radius: 10px;
    padding: 11px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="dot" id="dot" aria-hidden="true"></div>
    <h1>정보공유 채팅</h1>
    <span class="sub" id="status">연결 중…</span>
    <button class="name-chip" id="nameChip" title="닉네임 변경">닉네임</button>
  </header>

  <div class="banner" id="banner">
    ⚠️ Firebase 설정이 비어 있어요. 이 파일을 열어 <code>firebaseConfig</code> 부분에
    Firebase 콘솔에서 복사한 설정을 붙여넣어 주세요.
  </div>

  <div id="messages" aria-live="polite">
    <div class="empty" id="empty">아직 메시지가 없어요.<br>첫 메시지를 보내보세요 👋</div>
  </div>

  <div class="composer">
    <input id="input" placeholder="메시지를 입력하세요" maxlength="500" autocomplete="off">
    <button id="send" disabled>보내기</button>
  </div>
</div>

<div class="overlay hidden" id="overlay">
  <div class="modal">
    <h2>닉네임 정하기</h2>
    <p>채팅에 표시될 이름이에요. 메시지는 이 채팅방의 모든 멤버에게 공개돼요.</p>
    <input id="nameInput" placeholder="예: 연준" maxlength="20">
    <button id="nameSave">시작하기</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import {
  getDatabase, ref, push, query, limitToLast, onChildAdded
} from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

/* ================================================================
   ★★★ 여기만 수정하면 됩니다 ★★★
   Firebase 콘솔 → 프로젝트 설정 → 내 앱 → SDK 설정 및 구성에서
   firebaseConfig 객체를 복사해서 아래에 붙여넣으세요.
   databaseURL이 반드시 포함되어 있어야 합니다.
   (Realtime Database를 만들면 자동으로 포함돼요)
================================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyBJSzd1ynH0Z2Izmr-cT-SQXpAPZylGxbk",
  authDomain: "jumbo-chat-ee335.firebaseapp.com",
  databaseURL: "https://jumbo-chat-ee335-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "jumbo-chat-ee335",
  storageBucket: "jumbo-chat-ee335.firebasestorage.app",
  messagingSenderId: "379754284634",
  appId: "1:379754284634:web:0ac4124584a13be6d83a63"
};
/* ================================================================ */

const MAX_SHOW = 100;   // 화면에 불러올 최근 메시지 수
const NAME_KEY = 'chat-nickname';

const $msgs = document.getElementById('messages');
const $empty = document.getElementById('empty');
const $input = document.getElementById('input');
const $send = document.getElementById('send');
const $status = document.getElementById('status');
const $dot = document.getElementById('dot');
const $banner = document.getElementById('banner');
const $overlay = document.getElementById('overlay');
const $nameInput = document.getElementById('nameInput');
const $nameSave = document.getElementById('nameSave');
const $nameChip = document.getElementById('nameChip');

let nickname = localStorage.getItem(NAME_KEY) || null;
let db = null;
let messagesRef = null;

function fmtTime(ts) {
  const d = new Date(ts);
  const h = d.getHours(), m = String(d.getMinutes()).padStart(2, '0');
  const ampm = h < 12 ? '오전' : '오후';
  const hh = h % 12 === 0 ? 12 : h % 12;
  return `${ampm} ${hh}:${m}`;
}

function addMessageToUI(m) {
  $empty.style.display = 'none';
  const nearBottom = $msgs.scrollHeight - $msgs.scrollTop - $msgs.clientHeight < 80;

  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (m.name === nickname ? 'me' : 'other');

  if (m.name !== nickname) {
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = m.name;
    wrap.appendChild(meta);
  }
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = m.text;
  wrap.appendChild(bubble);

  const time = document.createElement('div');
  time.className = 'time';
  time.textContent = fmtTime(m.ts);
  wrap.appendChild(time);

  $msgs.appendChild(wrap);
  if (nearBottom) $msgs.scrollTop = $msgs.scrollHeight;
}

function connect() {
  if (!firebaseConfig.apiKey || !firebaseConfig.databaseURL) {
    $banner.classList.add('show');
    $status.textContent = '설정 필요';
    return;
  }
  try {
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    messagesRef = ref(db, 'messages');

    // 최근 MAX_SHOW개를 불러오고, 이후 새 메시지는 즉시 수신
    const q = query(messagesRef, limitToLast(MAX_SHOW));
    onChildAdded(q, (snap) => {
      const m = snap.val();
      if (m && m.name && m.text) addMessageToUI(m);
    });

    $status.textContent = '온라인';
    $dot.classList.add('on');
  } catch (e) {
    console.error(e);
    $status.textContent = '연결 실패';
    $banner.textContent = '⚠️ Firebase 연결에 실패했어요. firebaseConfig 값과 데이터베이스 규칙을 확인해 주세요.';
    $banner.classList.add('show');
  }
}

async function sendMessage() {
  const text = $input.value.trim();
  if (!text || !nickname || !messagesRef) return;
  $send.disabled = true;
  $input.value = '';
  try {
    await push(messagesRef, { name: nickname, text, ts: Date.now() });
  } catch (e) {
    console.error(e);
    $status.textContent = '전송 실패';
    $input.value = text;
  } finally {
    $send.disabled = $input.value.trim() === '';
    $input.focus();
  }
}

// ── 닉네임 ──
function openNameModal() {
  $nameInput.value = nickname || '';
  $overlay.classList.remove('hidden');
  $nameInput.focus();
}
function saveName() {
  const v = $nameInput.value.trim();
  if (!v) { $nameInput.focus(); return; }
  nickname = v;
  localStorage.setItem(NAME_KEY, nickname);
  $nameChip.textContent = nickname;
  $overlay.classList.add('hidden');
  $input.focus();
}

// ── 이벤트 ──
$send.addEventListener('click', sendMessage);
$input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.isComposing) { e.preventDefault(); sendMessage(); }
});
$input.addEventListener('input', () => { $send.disabled = $input.value.trim() === ''; });
$nameSave.addEventListener('click', saveName);
$nameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.isComposing) { e.preventDefault(); saveName(); }
});
$nameChip.addEventListener('click', openNameModal);

// ── 시작 ──
if (nickname) {
  $nameChip.textContent = nickname;
} else {
  openNameModal();
}
connect();
</script>
</body>
</html>
